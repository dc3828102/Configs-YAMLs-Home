server:
    interface: 0.0.0.0@5053
    rrset-roundrobin: yes
    qname-minimisation: yes
    aggressive-nsec: yes
    hide-identity: yes
    hide-version: yes
    http-user-agent: "DNS"
    identity: "DNS"
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes

    access-control: 127.0.0.1/32 allow
    access-control: 192.168.0.0/16 allow
    access-control: 172.16.0.0/12 allow
    access-control: 10.0.0.0/8 allow

    private-domain: "vcf.lab."
    private-domain: "vcf5.lab."
    private-domain: "vsp.lab."
    private-domain: "proxmox.lab."
    private-domain: "openshift.lab."

    local-zone: "vcf.lab" static
    local-zone: "vcf5.lab" static
    local-zone: "vsp.lab" static
    local-zone: "proxmox.lab" static
    local-zone: "openshift.lab" redirect

